services:
  - type: web
    name: urbnly-backend
    runtime: node
    plan: free
    branch: main
    buildCommand: yarn install --frozen-lockfile && yarn db:generate
    startCommand: yarn db:deploy && yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: urbnly-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: urbnly-postgres
    plan: free
    databaseName: urbnly
    user: urbnly
    postgresMajorVersion: "16"
