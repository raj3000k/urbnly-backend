services:
  postgres:
    image: postgres:16-alpine
    container_name: urbnly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: urbnly
      POSTGRES_USER: urbnly
      POSTGRES_PASSWORD: urbnly
    ports:
      - "5432:5432"
    volumes:
      - urbnly_postgres_data:/var/lib/postgresql/data

volumes:
  urbnly_postgres_data:
